[package]
name = "cosmic-wallpaper"
version = "0.1.0"
edition = "2021"
description = "A live wallpaper engine for the COSMIC desktop"
license = "MIT"

[dependencies]
tokio = { version = "1", features = ["full"] }
smithay-client-toolkit = { version = "0.19", features = ["calloop"] }
wayland-client = "0.31"
raw-window-handle = "0.6"
wayland-backend = { version = "0.3", features = ["client_system"] }
wgpu = "0.20"
wgpu_text = "0.8.0"
mpris = "2"
pipewire = "0.9.2"
rustfft = "6"
image = { version = "0.24", features = ["jpeg", "png"] }
palette = "0.7"
reqwest = { version = "0.11", features = ["json"] }
serde = { version = "1", features = ["derive"] }
toml = "0.8"
notify = "6"
anyhow = "1"
tracing = "0.1"
tracing-subscriber = "0.3"
ksni = "0.2"

[profile.release]
opt-level = 3
lto = true
