[package]
name = "cosmic-wallpaper"
version = "0.1.0"
edition = "2021"
description = "A live wallpaper engine for the COSMIC desktop"
license = "MIT"

[dependencies]
# --- Async runtime ---
# Tokio lets us handle multiple event sources (MPRIS, PipeWire, render loop)
# concurrently without blocking each other
tokio = { version = "1", features = ["full"] }

# --- Wayland (the display protocol on Linux) ---
# smithay-client-toolkit gives us access to the wlr-layer-shell protocol,
# which is how we render a surface behind all windows (the wallpaper layer)
smithay-client-toolkit = { version = "0.19", features = ["calloop"] }
wayland-client = "0.31"
wayland-protocols-wlr = { version = "0.2", features = ["client"] }

# --- GPU Rendering ---
# wgpu is a safe, cross-platform GPU abstraction in Rust.
# We use it to run shaders and draw animated scenes on the wallpaper surface.
wgpu = "0.19"
wgpu_text = "0.9.0"

# --- MPRIS (music player integration) ---
# MPRIS is a D-Bus standard that media players (Spotify, VLC, etc.) implement.
# This crate wraps the D-Bus calls so we can ask "what's playing right now?"
mpris = "2"

# --- Audio (PipeWire) ---
# PipeWire is the modern Linux audio system. We use it to get raw audio data
# for the visualiser — the actual waveform/frequencies of what's playing.
pipewire = "0.8"

# --- FFT (frequency analysis) ---
# To turn raw audio samples into a frequency spectrum (visualiser bars),
# we use a Fast Fourier Transform. rustfft handles this efficiently.
rustfft = "6"

# --- Image handling ---
# For decoding album art that comes from MPRIS metadata (usually JPEG or PNG)
image = { version = "0.24", features = ["jpeg", "png"] }

# --- Colour manipulation ---
# Lets us extract dominant colours from album art and blend between them smoothly
palette = "0.7"

# --- Weather ---
# HTTP client for fetching weather data from an open API
reqwest = { version = "0.11", features = ["json"] }

# --- Serialisation ---
# serde + toml for reading/writing our config file (~/.config/cosmic-wallpaper/config.toml)
serde = { version = "1", features = ["derive"] }
toml = "0.8"

# --- Error handling ---
# anyhow gives us easy, ergonomic error propagation — great for beginners
# as it means you don't have to define custom error types everywhere
anyhow = "1"

# --- Logging ---
tracing = "0.1"
tracing-subscriber = "0.3"

[profile.release]
# Optimise heavily for release builds — important for a GPU render loop
opt-level = 3
lto = true
