name: Release

# Builds release binaries and attaches them to the GitHub Release for the
# pushed tag. Triggered by `git push --tags` (tag must be vX.Y.Z, matching
# Cargo.toml's version) or manually via workflow_dispatch against an
# existing tag (useful for backfilling a release that predates this
# workflow).
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build and publish release binaries
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Same dependency list as pr-build.yml's Ubuntu job, which already
      # verifies this set is sufficient to build cosmic-wallpaper.
      - name: Install system dependencies
        run: |
          # nasm: assembler for the static ffmpeg build (static-ffmpeg
          # feature); the libav*-dev packages are gone for the same reason -
          # the standalone binaries must not link the host's ffmpeg.
          sudo apt-get update
          sudo apt-get install -y clang libclang-dev libpipewire-0.3-dev pkg-config libxkbcommon-dev libwayland-dev wayland-protocols libegl1-mesa-dev libdbus-1-dev libssl-dev nasm

      - name: Set up Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Verify tag matches Cargo.toml version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          CARGO_VERSION="$(grep -m1 '^version' Cargo.toml | sed -E 's/version = "(.*)"/\1/')"
          if [ "$TAG_VERSION" != "$CARGO_VERSION" ]; then
            echo "::error::Tag $GITHUB_REF_NAME (version $TAG_VERSION) does not match Cargo.toml version $CARGO_VERSION"
            exit 1
          fi

      # static-ffmpeg: the standalone binaries go to arbitrary distros whose
      # ffmpeg sonames CI cannot predict (an Arch ffmpeg major bump made
      # dynamically-linked releases die at the linker with exit 127), so
      # ffmpeg is compiled in. The .deb job below stays dynamic: its package
      # dependencies pin the distro's ffmpeg correctly.
      - name: Build release binaries
        run: cargo build --release --locked --all-targets --features static-ffmpeg

      - name: Verify binaries do not link a host ffmpeg
        run: |
          for bin in cosmic-wallpaper cosmic-wallpaper-gui; do
            if ldd "target/release/$bin" | grep -E "libav|libsw(scale|resample)|libpostproc"; then
              echo "::error::$bin still links ffmpeg dynamically; the static-ffmpeg feature did not take effect"
              exit 1
            fi
          done

      - name: Package release assets
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          DIST="$(pwd)/dist"
          mkdir -p "$DIST"

          # Stably-named standalone binaries (no version in the filename)
          # so a scripted consumer - e.g. a future in-app updater - can
          # always find "the current release" without knowing the version
          # ahead of time.
          cp target/release/cosmic-wallpaper "$DIST/cosmic-wallpaper-x86_64-linux-gnu"
          cp target/release/cosmic-wallpaper-gui "$DIST/cosmic-wallpaper-gui-x86_64-linux-gnu"

          # These binaries statically link FFmpeg (LGPL-2.1-or-later),
          # which requires the license and the written offer in
          # THIRD-PARTY-LICENSES.md to travel with each copy of the work -
          # shipped as its own asset so it sits right next to the raw
          # binaries above, not just inside the tarball below.
          cp THIRD-PARTY-LICENSES.md "$DIST/"

          # Versioned tarball with desktop entries, license and docs for
          # anyone installing by hand.
          PKG="cosmic-wallpaper-v${VERSION}-x86_64-linux-gnu"
          mkdir -p "$PKG"
          cp target/release/cosmic-wallpaper "$PKG/"
          cp target/release/cosmic-wallpaper-gui "$PKG/"
          cp io.github.kenyon_j.cosmic_wpengine.desktop "$PKG/"
          cp io.github.kenyon_j.cosmic_wpengine.autostart.desktop "$PKG/"
          # App icon, laid out for copying straight into ~/.local/share/icons
          cp -r resources/icons "$PKG/icons"
          cp LICENSE README.md THIRD-PARTY-LICENSES.md "$PKG/"
          tar -czf "$DIST/$PKG.tar.gz" "$PKG"
          rm -rf "$PKG"

          ( cd "$DIST" && sha256sum -- * > SHA256SUMS.txt )

      # The in-app updater only trusts hashes from a SHA256SUMS.txt whose
      # minisign signature verifies against the public key embedded in
      # src/modules/gui/updater.rs. The secret key exists ONLY in the
      # MINISIGN_SECRET_KEY repository secret (generated 2026-07,
      # passwordless so CI can sign non-interactively) - never in the tree.
      # A missing secret hard-fails the release: publishing an unsigned
      # release would brick self-updates for every user on a signed build.
      # rsign2 is a pure-Rust minisign implementation (same author).
      - name: Sign SHA256SUMS.txt
        env:
          MINISIGN_SECRET_KEY: ${{ secrets.MINISIGN_SECRET_KEY }}
        run: |
          set -euo pipefail
          if [ -z "$MINISIGN_SECRET_KEY" ]; then
            echo "::error::MINISIGN_SECRET_KEY secret is not set; refusing to publish an unsigned release"
            exit 1
          fi
          cargo install rsign2 --locked
          KEYFILE="$RUNNER_TEMP/minisign.key"
          printf '%s\n' "$MINISIGN_SECRET_KEY" > "$KEYFILE"
          rsign sign -W -s "$KEYFILE" \
            -x dist/SHA256SUMS.txt.minisig \
            -t "cosmic-wpengine $GITHUB_REF_NAME" \
            dist/SHA256SUMS.txt
          rm -f "$KEYFILE"

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          fail_on_unmatched_files: true
          # Curated notes for the tagged release; update this file as part of
          # each release's prep. The auto-generated commit list is appended.
          body_path: docs/RELEASE_NOTES.md
          generate_release_notes: true

  # Build the .deb for Pop!_OS / Ubuntu inside an Ubuntu 24.04 container so
  # the package's dependencies resolve against the Pop!_OS 24.04 library baseline,
  # then attach it to the same release.
  build-and-release-deb:
    name: Build and publish .deb (Ubuntu 24.04 / Pop!_OS)
    runs-on: ubuntu-latest
    container: ubuntu:24.04

    steps:
      - name: Install system dependencies
        run: |
          apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install -y curl git build-essential clang libclang-dev libpipewire-0.3-dev pkg-config libxkbcommon-dev libwayland-dev wayland-protocols libegl1-mesa-dev libdbus-1-dev ffmpeg libssl-dev libavutil-dev libavformat-dev libavfilter-dev libavdevice-dev libavcodec-dev libswscale-dev libswresample-dev libpostproc-dev

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Verify tag matches Cargo.toml version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          CARGO_VERSION="$(grep -m1 '^version' Cargo.toml | sed -E 's/version = "(.*)"/\1/')"
          if [ "$TAG_VERSION" != "$CARGO_VERSION" ]; then
            echo "::error::Tag $GITHUB_REF_NAME (version $TAG_VERSION) does not match Cargo.toml version $CARGO_VERSION"
            exit 1
          fi

      - name: Install cargo-deb
        run: cargo install cargo-deb --locked

      - name: Build .deb package
        run: cargo deb -- --locked

      - name: Verify package installs on Ubuntu 24.04
        shell: bash
        run: |
          apt-get install -y ./target/debian/*.deb
          # Confirm the installed binaries link against available libraries
          for bin in cosmic-wallpaper cosmic-wallpaper-gui; do
            if ldd "/usr/bin/$bin" | grep "not found"; then
              echo "::error::$bin has unresolved shared libraries"
              exit 1
            fi
          done

      # A version-free copy alongside the versioned one: cargo-deb names its
      # output with the version baked in (Debian convention), which can't
      # be resolved by GitHub's /releases/latest/download/<name> route -
      # that needs to know the exact filename ahead of time. This lets
      # install instructions use one stable URL instead of the user
      # visiting the Releases page to find the current filename.
      - name: Copy .deb to a stable, version-free filename
        run: cp target/debian/*.deb target/debian/cosmic-wallpaper_amd64.deb

      - name: Publish .deb to release
        uses: softprops/action-gh-release@v2
        with:
          files: target/debian/*.deb
          fail_on_unmatched_files: true
