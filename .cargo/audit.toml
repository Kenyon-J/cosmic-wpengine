# cargo-audit configuration. Consumed by the `Security audit` CI job
# (.github/workflows/pr-build.yml) and by `cargo audit` locally.
#
# The `ignore` list holds ONLY advisories in transitive dependencies we cannot
# fix from this crate — they live inside the libcosmic / cosmic-text / zbus /
# atspi stack, or in build-time tooling. Recheck on every libcosmic bump; drop
# entries as upstream resolves them.
#
# Deliberately NOT ignored (these are actionable from here and must clear
# before this job is switched from `continue-on-error` to hard-fail — see the
# V1 hardening plan, Phases 0 and 2):
#   RUSTSEC-2026-0098/-0099/-0104  rustls-webpki  -> reqwest 0.12 bump (Phase 2)
#   RUSTSEC-2026-0204              crossbeam-epoch -> image 0.25 bump (Phase 2)
#   RUSTSEC-2026-0190             anyhow          -> `cargo update -p anyhow` (>=1.0.103)
#   RUSTSEC-2026-0002             lru             -> lru 0.12 -> >=0.16.3 bump

[advisories]
ignore = [
    # quick-xml (quadratic attr scan + unbounded ns alloc DoS) via zbus/atspi.
    "RUSTSEC-2026-0194",
    "RUSTSEC-2026-0195",
    # Font shaping stack via cosmic-text — unmaintained, no drop-in replacement.
    "RUSTSEC-2026-0206", # rustybuzz unmaintained
    "RUSTSEC-2026-0192", # ttf-parser unmaintained
    # atty via a transitive CLI/logging dep (unmaintained + unaligned read).
    "RUSTSEC-2024-0375",
    "RUSTSEC-2021-0145",
    # Other unmaintained transitive build/runtime crates.
    "RUSTSEC-2021-0139", # ansi_term unmaintained
    "RUSTSEC-2025-0141", # bincode unmaintained
    "RUSTSEC-2026-0173", # proc-macro-error2 unmaintained
    "RUSTSEC-2024-0320", # yaml-rust unmaintained
    "RUSTSEC-2025-0134", # rustls-pemfile unmaintained
    # Unsound-but-not-reachable in our usage, transitive, no fix available.
    "RUSTSEC-2026-0186", # memmap2 unchecked pointer offset
    "RUSTSEC-2026-0097", # rand unsound only with a custom rng() logger (not our path)
]
